<div class="shell">
  <aside class="side-nav">
    <header class="brand">
      <h1>x2g Command Center</h1>
      <span class="status" [class.online]="telemetry.isConnected()">
        {{ telemetry.connectionState() }}
      </span>
    </header>
    <dx-tree-view
      [items]="telemetry.menuNodes()"
      keyExpr="id"
      displayExpr="label"
      (onItemClick)="onMenuItemClick($event)"
    />
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>
